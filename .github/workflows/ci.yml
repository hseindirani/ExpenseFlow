name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore ExpenseFlow.API/ExpenseFlow.API.sln

      - name: Build
        run: dotnet build ExpenseFlow.API/ExpenseFlow.API.sln --no-restore -c Release

      - name: Test
        run: dotnet test ExpenseFlow.API/ExpenseFlow.API.sln --no-build -c Release